name: Weekly SEO Keyword Report

on:
  schedule:
    - cron: '30 2 * * 1'  # Every Monday at 08:00 IST (02:30 UTC)
  workflow_dispatch:       # Allow manual trigger

jobs:
  weekly-keyword-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install anthropic python-dotenv

      - name: Run weekly keyword report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_OAUTH_SITE_1: ${{ secrets.GSC_OAUTH_SITE_1 }}
        run: python src/orchestrators/weekly.py
