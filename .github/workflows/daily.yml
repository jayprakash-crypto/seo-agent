name: Daily SEO Tasks

on:
  schedule:
    - cron: "41 15 * * *"   # 06:00 UTC every day
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python src/orchestrators/daily.py
        env:
          # Add secrets here
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
